      - name: reactive_power_var
        address: 330025
        labels:
          location: plant
          phase: 3
        dataType: int32
        metricType: gauge

      - name: reactive_power_var
        address: 330033
        labels:
          location: plant
          phase: total
        dataType: int32
        metricType: gauge

      - name: power_w
        address: 330035
        labels:
          location: PV
          phase: total
        dataType: int32
        metricType: gauge

      - name: power_w
        address: 330037
        labels:
          location: battery
          phase: total
        dataType: int32
        metricType: gauge

      - name: state_of_charge
        address: 330014
        dataType: uint16
        metricType: gauge
        factor: 0.1

      - name: charge_capacity_wh
        address: 330064
