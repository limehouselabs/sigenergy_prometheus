modules:
  # Sigenergy "plant" registers - accessed on modbus address (sub_target) 247.
  # These are overall summary stats for the system.
  - name: "sigenergy_plant"
    protocol: 'tcp/ip'
    metrics:
      - name: time
        address: 330000
        dataType: uint32
        metricType: gauge

      - name: sigenergy_mode
        address: 330003
        dataType: uint16
        metricType: gauge

      - name: sigenergy_state
        labels:
          type: plant
        address: 330051
        dataType: uint16
        metricType: gauge

      - name: grid_sensor_status
        address: 330004
        dataType: uint16
        metricType: gauge

      - name: active_power_w
        address: 330005
        labels:
          location: grid
          phase: total
        dataType: int32
        metricType: gauge

      - name: active_power_w
        address: 330052
        labels:
          location: grid
          phase: 1
        dataType: int32
        metricType: gauge

      - name: active_power_w
        address: 330054
        labels:
          location: grid
          phase: 2
        dataType: int32
        metricType: gauge

      - name: active_power_w
        address: 330056
        labels:
          location: grid
          phase: 3
        dataType: int32
        metricType: gauge

      - name: active_power_w
        address: 330015
        labels:
          location: plant
          phase: 1
        dataType: int32
        metricType: gauge

      - name: active_power_w
        address: 330017
        labels:
          location: plant
          phase: 2
        dataType: int32
        metricType: gauge

      - name: active_power_w
        address: 330019
        labels:
          location: plant
          phase: 3
        dataType: int32
        metricType: gauge

      - name: active_power_w
        address: 330031
        labels:
          location: plant
          phase: total
        dataType: int32
        metricType: gauge

      - name: reactive_power_var
        address: 330007
        labels:
          location: grid
          phase: total
