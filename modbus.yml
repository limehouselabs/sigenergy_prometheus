      - name: sigenergy_alarm
        labels:
          alarm: 4
        address: 330030
        dataType: uint16
        metricType: gauge


  # "Inverter" metrics, accessed on modbus address 1 by default (installer-configurable I think)
  # The inverter is a single unit which manages both solar and storage
  - name: "sigenergy_inverter"
